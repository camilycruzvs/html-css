<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bevan:ital@0;1&display=swap');

        :root {
            --cor00: #9d5e43ad;
            --cor01: #735244;
            --cor02: #483C37;
            --cor03: #332F2D;

            --fonte-padrao: 'Bebas Neue', Arial, Helvetica, sans-serif;
            --fonte-destaque: 'Bevan', cursive;
        }

        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            font-family: var(--fonte-destaque);
            background-color: var(--cor00);
        }

        header {
            background-image: linear-gradient(to bottom, var(--cor00), var(--cor01));
            color: white;
            padding: 30px;
        }

        header h1 {
            text-align: center;
            font-family: var(--fonte-padrao);
            font-size: 3.8em;
            text-shadow: 2px 3px 8px black;
        }

        header p {
            font-family: var(--fonte-destaque);
            text-align: center;
            text-shadow: 2px 4px 7px rgba(0, 0, 0, 0.577);
        }

        main {
            background-image: linear-gradient(to bottom, var(--cor00), var(--cor01));
            min-width: 300px;
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .galeria h2 {
            color: white;
            text-align: center;
            font-weight: normal;
            font-family: var(--fonte-destaque);
            font-size: 2em;
            background-image: linear-gradient(to right, var(--cor01), transparent);
            margin-bottom: 15px;
        }

        .galeria > div {
            display: grid;
            grid-template-columns: repeat(3, minmax(250px, 1fr));
            gap: 15px;
            padding: 0 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .galeria img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .galeria img:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border-radius: 20px;
            filter: brightness(1.1) contrast(1.05);
        }

    @media (max-width: 768px) {
        .galeria > div {
            grid-template-columns: repeat(2, minmax(100px, 1fr));
            gap: 10px;
            padding: 0 10px;
        }
        
        .galeria img {
            height: 200px;
            border-radius: 12px;
        }
        
        .galeria h2 {
            font-size: 1.3em;
            margin-bottom: 15px;
        }
        
    }

        .informacoes {
            background-image: linear-gradient(to bottom, var(--cor02), transparent);
            color: white;
            font-family: var(--fonte-padrao);
            text-align: center;
            margin-top: 15px;
            margin-bottom: -20px;
            padding: 20px;
            border-radius: 15px 15px 0px 0px;
            columns: 2;
        }

        .informacoes h2 {
            font-size: 1em;
            margin-bottom: 3px;
        }

        .contato a {
            color: white;
            text-decoration: none;
        }

        .contato a:hover {
            background-color: green;
            text-decoration: underline;
            padding: 3px;
        }

        footer {
            background-color: var(--cor02);
            color: white;
            padding: 5px;
            margin-top: 0;
            text-align: center;
        }

        footer a {
            text-decoration: none;
            color: white;
        }

        footer a:hover {
            color: wheat;
            text-decoration: underline;
        }
        
    </style>
</head>
<body>
    <header>
        <h1>Barbearia</h1>
        <p>Estilo e cuidado para homens de atitude!</p>
    </header>
    <main>
        <article>
            <section class="galeria">
                <h2>Nossa Galeria</h2>
                <div>
                    <div>
                        <img src="img/img-exemplo.png" alt="Fade Americano">
                    </div>
                    <div>
                        <img src="img/img-exemplo.png" alt="Clássico">
                    </div>
                    <div>
                        <img src="img/img-exemplo.png" alt="Degradê">
                    </div>
                    <div>
                        <img src="img/img-exemplo.png" alt="Fade Americano">
                    </div>
                    <div>
                        <img src="img/img-exemplo.png" alt="Clássico">
                    </div>
                    <div>
                        <img src="img/img-exemplo.png" alt="Degradê">
                    </div>
                </div>
            </section>
            <section class="informacoes">
                <div class="horarios">
                    <h2>Horário de Funcionamento</h2>
                    <p>Seg-Sáb: 8h às 21h</p>
                </div>
                <div class="contato">
                    <h2>Agende pelo WhatsApp</h2>
                    <a href="https://wa.me/55999984683394?text=Olá, quais as opções de agenda?" class="zap" target="_blank">Agendar</a>
                </div>
            </section>
        </article>
    </main>
    <footer>
        <p>Desenvolvido por <a href="https://www.instagram.com/_victoria_souza_cs?igsh=MXR5NzVLYjUzZXpnbg==" target="_blank"> Camily Cruz</a> | 2026</p>
    </footer>
</body>
</html>
