<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio do Astronauta</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        main {
            width: 100%;
            height: 100vh;
        }

        div {
            width: 100%;
            height: 100%;
            background-image: url(img/espaco.jpg);
            background-size: cover;
            background-position: center;
            
            display: flex;
            justify-content: center;
            align-items: center;
        }

        div img {
            width: auto;
            height: auto;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <main>
        <div>
            <img src="img/astronauta.png" alt="astronauta">
        </div>
    </main>
</body>
</html>
