<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio das IMG Flexível </title>
</head>

<body>
    <h1>Imagens Flexível</h1>
    <p>Você está vendo a imagem completa? Experimente ampliar o tamanho da sua janela para aproveitar a melhor
        experiência &#x1F60D;</p>
    <picture>
        <source media="(max-width: 850px)" srcset="img/foto-p.jpg" type="image/jpg">
        <source media="(max-width: 1299px)" srcset="img/foto-m.jpg" type="image/jpg">
        <img src="img/foto-g.jpg" alt="Foto-G">
    </picture>
</body>

</html>
