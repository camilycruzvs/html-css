<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        h1 {
            background-color: wheat;
            height: 300px;
            width: 300px;
            
            border: 10px solid maroon;

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed chocolate;
        }

        a {
            border: 7px solid #501b1bd9;

            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
