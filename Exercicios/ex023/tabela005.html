<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }

        th,
        td {
            border: 1px solid black;
            padding: 8px;
        }

        .cgroup {
            background: #008b8b60;
        }
    </style>
</head>

<body>
    <h1>Exercício de Tabelas</h1>

    <table>
        <colgroup>
            <col class="cnome">
            <col class="cgroup" span="2">
            <col class="cprof">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>

        <tr>
            <td>Rafaela Felícia</td>
            <td>F</td>
            <td>27</td>
            <td>Administradora</td>
        </tr>

        <tr>
            <td>Rafael Félix</td>
            <td>M</td>
            <td>27</td>
            <td>Programador</td>
        </tr>

        <tr>
            <td>Edward Cullen</td>
            <td>M</td>
            <td>30</td>
            <td>Médico</td>
        </tr>

        <tr>
            <td>Ysabella Swan</td>
            <td>F</td>
            <td>31</td>
            <td>Bióloga</td>
        </tr>

        <tr>
            <td>Gabriela Medvedovisky</td>
            <td>F</td>
            <td>33</td>
            <td>Atriz</td>
        </tr>

        <tr>
            <td>Alanis Guillen</td>
            <td>F</td>
            <td>28</td>
            <td>Atriz</td>
        </tr>

        <tr>
            <td>Klaus Mikaelson</td>
            <td>M</td>
            <td>40</td>
            <td>Caçador</td>
        </tr>
    </table>
</body>

</html>
